spring.application.name=SpringGateway

server.port=8080

# 상세 로깅 설정
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# 로그 패턴 설정 (요청/응답 정보 포함)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# JWT 설정 (시크릿은 환경변수 JWT_SECRET 로 주입. 아래 기본값은 로컬 개발 전용이며 prod 에서 반드시 override)
# 24시간(밀리초)
jwt.secret=${JWT_SECRET:haru-local-dev-insecure-jwt-secret-change-in-prod-please}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.header=Authorization
jwt.prefix=Bearer

# 프로필 설정

spring.cloud.gateway.httpclient.response-timeout=300000